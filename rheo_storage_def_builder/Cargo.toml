[package]
name = "rheo_storage_def_builder"
version = "0.1.0"
edition = "2024"

[lib]
name = "rheo_storage_def_builder"

[dependencies]
clap = { version = "4.5", features = ["derive"] }
once_cell = "1.21"
quick-xml = { version = "0.37", features = ["serialize"] }
rheo_storage_lib = { path = "../rheo_storage_lib" }
serde = { version = "1.0", features = ["derive"] }
tempfile = "3.20"
thiserror = "2.0"
