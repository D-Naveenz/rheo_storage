name: Release Rust Workspace

on:
  workflow_dispatch:
    inputs:
      bump_version:
        description: Bump the Rust workspace version during release
        required: true
        default: false
        type: boolean
      level:
        description: Version bump level or explicit semver value when bump_version is enabled
        required: false
        default: patch
        type: string
      execute:
        description: Execute the release instead of running a dry run
        required: true
        default: false
        type: boolean

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

concurrency:
  group: release-rust-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: cargo release
    runs-on: windows-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          lfs: true
          persist-credentials: true

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-release
        run: cargo install cargo-release --locked

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Resolve release mode
        id: release_mode
        shell: pwsh
        run: |
          if ("${{ inputs.bump_version }}" -eq "true") {
            $value = "${{ inputs.level }}"
            if ([string]::IsNullOrWhiteSpace($value)) {
              throw "level is required when bump_version=true."
            }

            "mode=bump-and-release" >> $env:GITHUB_OUTPUT
            "value=$value" >> $env:GITHUB_OUTPUT
            return
          }

          "mode=release-current-version" >> $env:GITHUB_OUTPUT
          "value=" >> $env:GITHUB_OUTPUT

      - name: Report release mode
        shell: pwsh
        run: |
          Write-Host "Release mode: ${{ steps.release_mode.outputs.mode }}"
          if ([string]::IsNullOrWhiteSpace("${{ steps.release_mode.outputs.value }}")) {
            Write-Host "cargo release argument: <default release level>"
          } else {
            Write-Host "cargo release argument: ${{ steps.release_mode.outputs.value }}"
          }

      - name: Validate workspace before release
        run: |
          cargo run -p dhara_tool -- verify release-config
          cargo test -p dhara_storage --all-features
          cargo test -p dhara_storage_native
          cargo test -p dhara_tool_dhara_storage
          cargo test -p dhara_tool
          dotnet test --configuration Release bindings/dotnet/Dhara.Storage.Tests/Dhara.Storage.Tests.csproj

      - name: Ensure crates.io token is present
        if: ${{ inputs.execute }}
        run: |
          if (-not $env:CARGO_REGISTRY_TOKEN) {
            throw "CARGO_REGISTRY_TOKEN is required for execute=true."
          }
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Run workspace release
        shell: pwsh
        run: |
          $args = @("release")
          $level = "${{ steps.release_mode.outputs.value }}"
          if (-not [string]::IsNullOrWhiteSpace($level)) {
            $args += $level
          }
          $args += @("--workspace", "--isolated", "--tag-name", "v{{version}}", "--no-confirm")
          if ("${{ inputs.execute }}" -eq "true") {
            $args += "--execute"
          } else {
            $args += "--no-verify"
          }

          Write-Host ("Invoking: cargo " + ($args -join " "))
          & cargo @args
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
