name: CI

on:
  pull_request:
  push:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  fmt:
    name: fmt
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: rustfmt

      - name: Check formatting
        run: |
          cargo fmt -p rheo_storage --check
          cargo fmt -p rheo_storage_ffi --check
          cargo fmt -p rheo_storage_def_builder --check

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

  clippy:
    name: clippy (windows)
    runs-on: windows-latest
    permissions:
      contents: read
      checks: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: clippy

      - name: Run clippy for Rheo crates
        run: |
          cargo clippy -p rheo_storage --all-targets --all-features -- -D warnings
          cargo clippy -p rheo_storage_ffi --all-targets -- -D warnings
          cargo clippy -p rheo_storage_def_builder --all-targets -- -D warnings

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

  test:
    name: test (windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Run Rheo tests
        run: |
          cargo test -p rheo_storage --all-features
          cargo test -p rheo_storage_ffi
          cargo test -p rheo_storage_def_builder
          dotnet run --project bindings/dotnet/Rheo.Storage.TestHost/Rheo.Storage.TestHost.csproj

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

  doc:
    name: doc (windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Build docs for Rheo crates
        run: |
          cargo doc -p rheo_storage --no-deps --all-features
          cargo doc -p rheo_storage_ffi --no-deps

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2
