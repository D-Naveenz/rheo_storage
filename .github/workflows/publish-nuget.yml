name: Publish NuGet

on:
  workflow_dispatch:
    inputs:
      version:
        description: Optional NuGet version override
        required: false
        type: string
      dry_run:
        description: Validate and build artifacts without publishing
        required: true
        default: true
        type: boolean

env:
  CARGO_TERM_COLOR: always
  DOTNET_CLI_HOME: ${{ github.workspace }}\.dotnet

permissions:
  contents: read

concurrency:
  group: publish-nuget-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: publish Dhara.Storage (windows)
    runs-on: windows-latest
    environment: nuget-production

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Add Rust targets
        run: rustup target add aarch64-pc-windows-msvc

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Publish package
        shell: pwsh
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          $arguments = @("run", "-p", "dhara_tool", "--", "release", "publish")

          if ($env:INPUT_VERSION) {
            $arguments += @("--version", $env:INPUT_VERSION)
          }

          if ($env:INPUT_DRY_RUN -eq "true") {
            $arguments += "--dry-run"
          }
          else {
            $arguments += "--execute"
          }

          & cargo @arguments
